<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OFK Jersey Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --green: #49edc7;
}

/* GLOBAL FIX */
* {
  box-sizing: border-box; /* 🔥 fixes ALL width inconsistencies */
}

/* NO SCROLL */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "Space Grotesk", sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  background: linear-gradient(135deg, #0a1a63, #153781);
}

/* 🔥 FLAMES */
.fire-container {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 260px;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.flame {
  position: absolute;
  bottom: 0;
  width: 90px;
  height: 160px;

  background:
    radial-gradient(circle at 50% 80%, rgba(255,200,0,0.9), transparent 40%),
    radial-gradient(circle at 50% 60%, rgba(255,100,0,0.7), transparent 60%),
    radial-gradient(circle at 50% 40%, rgba(255,0,0,0.6), transparent 70%);

  border-radius: 50%;
  filter: blur(2px);
  animation: flameRise 2.2s infinite ease-in;
}

.flame:nth-child(1){ left:10%; animation-delay:0s; }
.flame:nth-child(2){ left:30%; animation-delay:0.4s; }
.flame:nth-child(3){ left:50%; animation-delay:0.8s; }
.flame:nth-child(4){ left:70%; animation-delay:1.2s; }
.flame:nth-child(5){ left:85%; animation-delay:0.6s; }

@keyframes flameRise {
  0% { transform: translateY(0) scale(1); opacity: 0.9; }
  50% { transform: translateY(-120px) scale(1.2); }
  100% { transform: translateY(-240px) scale(1.6); opacity: 0; }
}

/* CONTAINER */
.container {
  width: calc(100% - 32px);
  max-width: 420px;
  padding: 24px;
  border-radius: 22px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  text-align: center;
  z-index: 10;
}

/* TEXT */
h1 {
  font-size: 34px;
  text-transform: uppercase;
}

h2 {
  text-transform: uppercase;
}

/* FORM LAYOUT (🔥 KEY FIX) */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* INPUT + BUTTON UNIFIED */
input,
button {
  width: 100%;
  display: block;
  border-radius: 999px;
  border: none;
  font-size: 16px;
}

/* INPUT */
input {
  padding: 16px;
}

/* BUTTON */
button {
  padding: 16px;
  background: var(--green);
  color: #0a1a63;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
}

/* HIDE */
.hidden { display: none; }

/* REVEAL */
#teamName {
  font-size: 40px;
  opacity: 0;
  transition: opacity 1s;
}

#teamLogo {
  max-width: 150px;
  opacity: 0;
  transition: opacity 1s;
}

#revealPage.show #teamName,
#revealPage.show #teamLogo {
  opacity: 1;
}

/* ⚽ FIREWORKS */
.ball {
  position: fixed;
  width: 30px;
  height: 30px;
  z-index: 20;
}

.ball img {
  width: 100%;
  animation: spin 1s linear;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes explode {
  0% { transform: translate(0,0) scale(0.3); opacity:1; }
  70% { opacity:1; }
  100% { transform: translate(var(--x),var(--y)) scale(1.4); opacity:0; }
}
</style>
</head>

<body>

<div class="fire-container">
  <div class="flame"></div>
  <div class="flame"></div>
  <div class="flame"></div>
  <div class="flame"></div>
  <div class="flame"></div>
</div>

<div class="container" id="welcomePage">
  <img src="OFK.png" width="90">
  <h1>OFK Jersey Reveal</h1>
  <button onclick="startReveal()">Start</button>
</div>

<div class="container hidden" id="inputPage">
  <h2>Find Your Team</h2>

  <div class="form-group">
    <input id="firstName" placeholder="First Name">
    <input id="surname" placeholder="Surname">
    <button onclick="revealTeam()">Reveal</button>
  </div>

</div>

<div class="container hidden" id="revealPage">
  <h2 id="welcome-line"></h2>
  <h1 id="teamName"></h1>
  <img id="teamLogo">
</div>

<audio id="cheer-sound" src="im_coming_to_the_cotta.mp3"></audio>

<script>
let playerData = {
  "Jeffrey Warren": "Vancity",
  "Aaron Gill": "Fountainhead",
  "Brandon Carless-Jones": "EY"
};

let teamLogos = {
  "Fountainhead": "fountainhead.jpg",
  "Solve": "solve.jpg",
  "Numbers": "numbers.png",
  "EY": "EY.png",
  "Fanny Bay Oyster": "fanny.png",
  "Qmunity": "qmunity.png",
  "Prince of Whales": "prince.svg",
  "Pumpjack": "pumpjack.png",
  "Shinden": "shinden.jpg",
  "Vancity": "vancity.png",
  "Forza": "forza.png",
  "Junction": "junction.png"
};

function startReveal(){
  welcomePage.classList.add("hidden");
  inputPage.classList.remove("hidden");
}

function explosion(x,y,count=14){
  for(let i=0;i<count;i++){
    let b=document.createElement("div");
    b.className="ball";

    let img=document.createElement("img");
    img.src="OFK.png";
    b.appendChild(img);

    document.body.appendChild(b);

    let angle=Math.random()*Math.PI*2;
    let dist=260+Math.random()*180;

    b.style.left=x+"px";
    b.style.top=y+"px";

    b.style.setProperty("--x",Math.cos(angle)*dist+"px");
    b.style.setProperty("--y",Math.sin(angle)*dist+"px");

    b.style.animation="explode 1400ms ease-out forwards";

    setTimeout(()=>b.remove(),1400);
  }
}

function fireworksShow(){
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      explosion(
        innerWidth*(0.2+Math.random()*0.6),
        innerHeight*(0.2+Math.random()*0.3)
      );
    },i*220);
  }
}

function revealTeam(){

  let a=document.getElementById("cheer-sound");
  a.currentTime=0;
  a.play().catch(()=>{});

  let name=firstName.value.trim()+" "+surname.value.trim();
  let team=playerData[name];

  if(team){

    fireworksShow();

    setTimeout(()=>{
      inputPage.classList.add("hidden");
      revealPage.classList.remove("hidden");
      revealPage.classList.add("show");
    },1000);

    teamName.textContent=team;

    if(teamLogos[team]){
      teamLogo.src=teamLogos[team];
    }

  } else {
    alert("Name not found");
  }
}
</script>

</body>
</html>
