<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Jersey Party 2026 Team Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --ofk-light-blue: #0a9acf;
  --ofk-dark-blue: #153781;
  --ofk-highlight-green: #49edc7;
  --ofk-extra-dark-blue: #0a1a63;
}

body {
  margin: 0;
  font-family: "Space Grotesk", system-ui, sans-serif;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top left, rgba(73,237,199,0.15), transparent),
    radial-gradient(circle at bottom right, rgba(10,154,207,0.2), transparent),
    linear-gradient(135deg, var(--ofk-extra-dark-blue), var(--ofk-dark-blue), var(--ofk-light-blue));
}

/* 🔥 Fire glow */
.fire-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(circle at center, rgba(73,237,199,0.2), transparent 70%);
  animation: firePulse 2s infinite alternate;
}

@keyframes firePulse {
  0% { opacity: 0.3; }
  100% { opacity: 0.6; }
}

.container {
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 26px;
  border-radius: 26px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  text-align: center;
}

.hidden { display: none; }

h1 {
  font-size: 32px;
  margin: 10px 0;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 999px;
  border: none;
  background: var(--ofk-highlight-green);
  color: #0a1a63;
  font-weight: bold;
  cursor: pointer;
}

#teamName {
  font-size: 40px;
  margin-top: 10px;
  opacity: 0;
  transition: opacity 1s ease;
}

#teamLogo {
  max-width: 160px;
  margin-top: 14px;
  opacity: 0;
  transition: opacity 1s ease;
}

#revealPage.show #teamName,
#revealPage.show #teamLogo {
  opacity: 1;
}

/* ⚽ explosion particles */
.ball {
  position: fixed;
  width: 28px;
  height: 28px;
  pointer-events: none;
  z-index: 20;
}

.ball img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(73,237,199,0.7));
  animation: spin 0.8s linear;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes explode {
  0% {
    transform: translate(0,0) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(1.2);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="fire-bg"></div>

<div class="container" id="welcomePage">
  <img src="OFK.png" width="100">
  <h1>OFK Jersey Reveal</h1>
  <button onclick="startReveal()">Start</button>
</div>

<div class="container hidden" id="inputPage">
  <h2>Find Your Team</h2>
  <input id="firstName" placeholder="First Name">
  <input id="surname" placeholder="Surname">
  <button onclick="revealTeam()">Reveal</button>
</div>

<div class="container hidden" id="revealPage">
  <h2 id="welcome-line"></h2>
  <h1 id="teamName"></h1>
  <img id="teamLogo" class="hidden">
</div>

<audio id="cheer-sound" src="im_coming_to_the_cotta.mp3"></audio>

<script>
let playerData = {
  "Jeffrey Warren": "Vancity",
  "Brandon Carless-Jones": "EY"
};

let teamLogos = {
  "Vancity": "vancity.png",
  "EY": "EY.png"
};

function startReveal() {
  welcomePage.classList.add("hidden");
  inputPage.classList.remove("hidden");
}

function soccerExplosion(x, y, count = 12) {
  for (let i = 0; i < count; i++) {
    const ball = document.createElement("div");
    ball.className = "ball";

    const img = document.createElement("img");
    img.src = "OFK.png";
    ball.appendChild(img);

    document.body.appendChild(ball);

    const angle = Math.random() * 2 * Math.PI;
    const distance = 180 + Math.random() * 120;

    const dx = Math.cos(angle) * distance + "px";
    const dy = Math.sin(angle) * distance + "px";

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    ball.style.setProperty("--x", dx);
    ball.style.setProperty("--y", dy);

    ball.style.animation = "explode 800ms ease-out forwards";

    setTimeout(() => ball.remove(), 800);
  }
}

function revealTeam() {

  // 🔊 sound instantly
  const audio = document.getElementById("cheer-sound");
  audio.currentTime = 0;
  audio.play().catch(()=>{});

  let first = firstName.value.trim();
  let last = surname.value.trim();
  let full = `${first} ${last}`;

  typeWriter(`You’ve been selected...`, "welcome-line");

  let team = playerData[full];

  if (team) {

    // 💥 explosions
    soccerExplosion(window.innerWidth/2, window.innerHeight/2, 14);

    setTimeout(() => {
      inputPage.classList.add("hidden");
      revealPage.classList.remove("hidden");
      revealPage.classList.add("show");
    }, 600);

    teamName.textContent = team;

    if (teamLogos[team]) {
      teamLogo.src = teamLogos[team];
      teamLogo.classList.remove("hidden");
    }

  } else {
    alert("Name not found");
  }
}

function typeWriter(text, id, speed=50){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,speed);
    }
  }
  t();
}
</script>

</body>
</html>
