<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OFK Jersey Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #153781;
  --light: #0a9acf;
  --green: #49edc7;
}

/* Base */
body {
  margin: 0;
  font-family: "Space Grotesk", sans-serif;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a1a63, #153781);
}

/* 🔥 Fire Background */
.fire-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 0;
  pointer-events: none;

  background:
    radial-gradient(circle at 50% 120%, rgba(255,80,0,0.6), transparent 60%),
    radial-gradient(circle at 20% 120%, rgba(255,120,0,0.5), transparent 60%),
    radial-gradient(circle at 80% 120%, rgba(255,50,0,0.5), transparent 60%);
    
  animation: fireMove 2s infinite alternate;
}

@keyframes fireMove {
  0% { transform: translateY(0px) scale(1); opacity: 0.6; }
  100% { transform: translateY(-20px) scale(1.05); opacity: 0.9; }
}

/* Card */
.container {
  z-index: 10;
  width: 90%;
  max-width: 420px;
  padding: 24px;
  border-radius: 22px;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.35);
  text-align: center;
}

/* Typography */
h1 {
  font-size: 34px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

h2 {
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

/* 🔥 Buttons FIXED */
button {
  width: 100%;
  padding: 16px;
  border-radius: 999px;
  border: none;

  background: var(--green);
  color: #0a1a63;

  font-family: "Space Grotesk", sans-serif;
  font-weight: 700;
  font-size: 16px;

  text-transform: uppercase;
  letter-spacing: 1.2px;

  cursor: pointer;
  transition: all 0.2s ease;

  box-shadow: 0 6px 20px rgba(73, 237, 199, 0.3);
}

button:hover {
  transform: translateY(-2px);
  background: #3de2bc;
}

/* Hidden */
.hidden { display: none; }

/* Reveal */
#teamName {
  font-size: 40px;
  opacity: 0;
  transition: opacity 1s;
}

#teamLogo {
  max-width: 150px;
  opacity: 0;
  transition: opacity 1s;
}

#revealPage.show #teamName,
#revealPage.show #teamLogo {
  opacity: 1;
}

/* ⚽ Explosion */
.ball {
  position: fixed;
  width: 30px;
  height: 30px;
  z-index: 20;
}

.ball img {
  width: 100%;
  filter: drop-shadow(0 0 6px rgba(73,237,199,0.7));
  animation: spin 0.8s linear;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes explode {
  0% { transform: translate(0,0) scale(0.5); opacity:1; }
  100% { transform: translate(var(--x),var(--y)) scale(1.2); opacity:0; }
}
</style>
</head>

<body>

<div class="fire-bg"></div>

<div class="container" id="welcomePage">
  <img src="OFK.png" width="90">
  <h1>OFK Jersey Reveal</h1>
  <button onclick="startReveal()">Start</button>
</div>

<div class="container hidden" id="inputPage">
  <h2>Find Your Team</h2>
  <input id="firstName" placeholder="First Name">
  <input id="surname" placeholder="Surname">
  <button onclick="revealTeam()">Reveal</button>
</div>

<div class="container hidden" id="revealPage">
  <h2 id="welcome-line"></h2>
  <h1 id="teamName"></h1>
  <img id="teamLogo">
</div>

<audio id="cheer-sound" src="yay.mp3"></audio>

<script>
let playerData = {
  "Jeffrey Warren": "Vancity",
  "Brandon Carless-Jones": "EY"
};

let teamLogos = {
  "Vancity": "vancity.png",
  "EY": "EY.png"
};

function startReveal(){
  welcomePage.classList.add("hidden");
  inputPage.classList.remove("hidden");
}

function explosion(x,y,count=12){
  for(let i=0;i<count;i++){
    let b=document.createElement("div");
    b.className="ball";

    let img=document.createElement("img");
    img.src="OFK.png";
    b.appendChild(img);

    document.body.appendChild(b);

    let angle=Math.random()*Math.PI*2;
    let dist=200+Math.random()*100;

    b.style.left=x+"px";
    b.style.top=y+"px";

    b.style.setProperty("--x",Math.cos(angle)*dist+"px");
    b.style.setProperty("--y",Math.sin(angle)*dist+"px");

    b.style.animation="explode 800ms forwards";

    setTimeout(()=>b.remove(),800);
  }
}

function revealTeam(){

  // 🔊 sound instantly
  let a=document.getElementById("cheer-sound");
  a.currentTime=0;
  a.play().catch(()=>{});

  let name=firstName.value.trim()+" "+surname.value.trim();
  let team=playerData[name];

  if(team){

    explosion(innerWidth/2,innerHeight/2,14);

    setTimeout(()=>{
      inputPage.classList.add("hidden");
      revealPage.classList.remove("hidden");
      revealPage.classList.add("show");
    },600);

    teamName.textContent=team;

    if(teamLogos[team]){
      teamLogo.src=teamLogos[team];
    }

  } else {
    alert("Name not found");
  }
}
</script>

</body>
</html>
