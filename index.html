<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OFK Jersey Reveal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { --green: #49edc7; }
* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "Space Grotesk", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  background: linear-gradient(135deg, #0a1a63, #153781);
  color: white;
}

/* 🔥 FLAMES */
.fire-container {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 260px;
  pointer-events: none;
  z-index: 0;
}

.flame {
  position: absolute;
  bottom: 0;
  width: 60px;
  height: 140px;
  border-radius: 50% 50% 40% 40%;
  filter: blur(6px);

  background:
    radial-gradient(circle at 50% 80%, #ffd27f, transparent 40%),
    radial-gradient(circle at 50% 60%, #ff6a00, transparent 60%),
    radial-gradient(circle at 50% 30%, #ff0000, transparent 70%);

  animation: flameFlicker 1.6s infinite ease-in-out;
}

.flame:nth-child(1){ left:15%; }
.flame:nth-child(2){ left:35%; animation-delay:0.3s; }
.flame:nth-child(3){ left:55%; animation-delay:0.6s; }
.flame:nth-child(4){ left:75%; animation-delay:0.9s; }
.flame:nth-child(5){ left:90%; animation-delay:0.4s; }

@keyframes flameFlicker {
  0% { transform: scale(1) translateY(0); opacity:0.9; }
  50% { transform: scale(0.8,1.4) translateY(-40px); }
  100% { transform: scale(1.1,1.8) translateY(-120px); opacity:0; }
}

/* ✨ EMBERS */
.ember {
  position: fixed;
  bottom: 0;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffd27f, #ff6a00);
  animation: emberRise linear forwards;
}

@keyframes emberRise {
  100% {
    transform: translateY(-300px) translateX(var(--drift));
    opacity: 0;
  }
}

/* CARD */
.container {
  width: calc(100% - 32px);
  max-width: 420px;
  padding: 24px;
  border-radius: 22px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  text-align: center;
  z-index: 10;
}

h1 { text-transform: uppercase; font-size: 34px; }
h2 { text-transform: uppercase; }

.form-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input, button {
  width: 100%;
  border-radius: 999px;
  border: none;
  font-size: 16px;
  padding: 16px;
}

button {
  background: var(--green);
  color: #0a1a63;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
}

.hidden { display: none; }

#teamName {
  font-size: 40px;
  opacity: 0;
  transition: opacity 1s;
}

#teamLogo {
  max-width: 150px;
  opacity: 0;
  transition: opacity 1s;
}

#revealPage.show #teamName,
#revealPage.show #teamLogo {
  opacity: 1;
}

/* 🎆 FIREWORKS */
.ball {
  position: fixed;
  width: 30px;
}

.ball img {
  width: 100%;
  animation: spin 1s linear;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes explode {
  100% {
    transform: translate(var(--x),var(--y)) scale(1.4);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="fire-container">
  <div class="flame"></div><div class="flame"></div>
  <div class="flame"></div><div class="flame"></div>
  <div class="flame"></div>
</div>

<div class="container" id="welcomePage">
  <img src="OFK.png" width="90">
  <h1>OFK Jersey Reveal</h1>
  <button onclick="startReveal()">Start</button>
</div>

<div class="container hidden" id="inputPage">
  <h2>Find Your Team</h2>

  <div class="form-group">
    <input id="firstName" placeholder="First Name">
    <input id="surname" placeholder="Surname">
    <input id="middleInitial" placeholder="Middle Initial" maxlength="1" class="hidden">
    <button onclick="revealTeam()">Reveal</button>
  </div>
</div>

<div class="container hidden" id="revealPage">
  <h2 id="welcome-line"></h2>
  <h1 id="teamName"></h1>
  <img id="teamLogo">
</div>

<audio id="cheer-sound" src="im_coming_to_the_cotta.mp3"></audio>

<script>

/* 🔥 EMBERS LOOP */
setInterval(()=>{
  let e=document.createElement("div");
  e.className="ember";
  e.style.left=Math.random()*innerWidth+"px";
  e.style.setProperty("--drift",(Math.random()*80-40)+"px");
  e.style.animationDuration=(2+Math.random()*2)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),4000);
},120);

/* 🎆 FIREWORKS */
function explosion(x,y,count=12){
  for(let i=0;i<count;i++){
    let b=document.createElement("div");
    b.className="ball";
    let img=document.createElement("img");
    img.src="OFK.png";
    b.appendChild(img);
    document.body.appendChild(b);

    let angle=Math.random()*Math.PI*2;
    let dist=250+Math.random()*150;

    b.style.left=x+"px";
    b.style.top=y+"px";

    b.style.setProperty("--x",Math.cos(angle)*dist+"px");
    b.style.setProperty("--y",Math.sin(angle)*dist+"px");

    b.style.animation="explode 1400ms forwards";
    setTimeout(()=>b.remove(),1400);
  }
}

function fireworksShow(){
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      explosion(innerWidth*(0.2+Math.random()*0.6),
                innerHeight*(0.2+Math.random()*0.3));
    },i*200);
  }
}

/* 👤 PLAYER DATA */
let playerData = [
  { firstName:"Aaron", middleInitial:"", surname:"Gill", team:"Fountainhead" },
  { firstName:"Jeffrey", middleInitial:"", surname:"Warren", team:"Vancity" },
  { firstName:"Brandon", middleInitial:"", surname:"Carless-Jones", team:"EY" },
  { firstName:"Andrew", middleInitial:"D", surname:"Wilson", team:"Forza" },
  { firstName:"Andrew", middleInitial:"F", surname:"Wilson", team:"Solve" }
];

let teamLogos = {
  "Fountainhead": "fountainhead.jpg",
  "Solve": "solve.jpg",
  "Numbers": "numbers.png",
  "EY": "EY.png",
  "Fanny Bay Oyster": "fanny.png",
  "Qmunity": "qmunity.png",
  "Prince of Whales": "prince.svg",
  "Pumpjack": "pumpjack.png",
  "Shinden": "shinden.jpg",
  "Vancity": "vancity.png",
  "Forza": "forza.png",
  "Junction": "junction.png"
};

function startReveal(){
  welcomePage.classList.add("hidden");
  inputPage.classList.remove("hidden");
}

/* 🔍 MAIN LOGIC */
function revealTeam(){

  let first = firstName.value.trim().toLowerCase();
  let last = surname.value.trim().toLowerCase();
  let middle = middleInitial.value.trim().toLowerCase();

  let matches = playerData.filter(p =>
    p.firstName.toLowerCase() === first &&
    p.surname.toLowerCase() === last
  );

  if(matches.length === 0){
    alert("Name not found");
    return;
  }

  if(matches.length === 1){
    showTeam(matches[0]);
    return;
  }

  if(middle === ""){
    middleInitial.classList.remove("hidden");
    middleInitial.focus();
    alert("Multiple players found. Enter your middle initial.");
    return;
  }

  let player = matches.find(p =>
    p.middleInitial.toLowerCase() === middle
  );

  if(player){
    showTeam(player);
  } else {
    alert("Middle initial incorrect");
  }
}

function showTeam(player){

  let a=document.getElementById("cheer-sound");
  a.currentTime=0;
  a.play().catch(()=>{});

  fireworksShow();

  setTimeout(()=>{
    inputPage.classList.add("hidden");
    revealPage.classList.remove("hidden");
    revealPage.classList.add("show");
  },1000);

  teamName.textContent = player.team;

  if(teamLogos[player.team]){
    teamLogo.src = teamLogos[player.team];
  }
}

</script>
</body>
</html>
